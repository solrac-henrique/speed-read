<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Read - Modo Kindle</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f0e8;
            --card: #faf7f0;
            --texto: #382d1f;
            --texto-claro: #8b7355;
            --borda: #d4c5b2;
            --dourado: #b8956a;
            --destaque: #8b6914;
            --sombra: 0 2px 12px rgba(0,0,0,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background-image: 
                linear-gradient(180deg, rgba(139,105,20,0.03) 0%, transparent 50%),
                linear-gradient(0deg, rgba(139,105,20,0.02) 0%, transparent 50%);
            color: var(--texto);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Efeito de textura de papel */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.015'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        .kindle-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 650px;
            background: var(--card);
            border: 1px solid var(--borda);
            border-radius: 8px;
            box-shadow: 
                var(--sombra),
                0 1px 0 rgba(0,0,0,0.04),
                0 0 0 8px #e8e0d0,
                0 0 0 9px rgba(0,0,0,0.05),
                0 0 0 12px #f0ebe0,
                0 0 0 13px rgba(0,0,0,0.03);
            overflow: hidden;
            min-height: 500px;
            display: flex;
            flex-direction: column;
        }

        /* Barra superior estilo Kindle */
        .kindle-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            border-bottom: 1px solid var(--borda);
            background: var(--card);
        }

        .kindle-title {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--texto-claro);
            letter-spacing: 0.5px;
        }

        .kindle-icons {
            display: flex;
            gap: 16px;
            color: var(--texto-claro);
            font-size: 0.85rem;
        }

        .kindle-icon {
            cursor: pointer;
            transition: color 0.2s;
            font-size: 1rem;
        }

        .kindle-icon:hover { color: var(--texto); }

        /* Área de leitura */
        .reader-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 40px;
            min-height: 380px;
            position: relative;
        }

        /* Palavra atual - ESTILO KINDLE */
        .word-display {
            text-align: center;
            transition: all 0.1s ease;
        }

        .current-word {
            font-family: 'Libre Baskerville', 'Georgia', serif;
            font-size: 4.5rem;
            font-weight: 400;
            color: var(--texto);
            line-height: 1;
            letter-spacing: -1px;
            transition: color 0.3s;
        }

        .word-context {
            font-family: 'Libre Baskerville', 'Georgia', serif;
            font-size: 1.1rem;
            color: var(--texto-claro);
            margin-top: 20px;
            font-style: italic;
            opacity: 0.7;
            min-height: 24px;
        }

        /* Indicador de posição */
        .position-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 32px;
            font-size: 0.75rem;
            color: var(--texto-claro);
            letter-spacing: 0.5px;
        }

        .progress-dot {
            width: 6px;
            height: 6px;
            background: var(--dourado);
            border-radius: 50%;
            transition: all 0.3s;
        }

        .progress-dot.active {
            width: 8px;
            height: 8px;
            background: var(--destaque);
        }

        /* Barra de progresso estilo Kindle */
        .kindle-progress {
            width: 100%;
            padding: 0 24px 14px;
        }

        .progress-bar-kindle {
            width: 100%;
            height: 3px;
            background: var(--borda);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill-kindle {
            height: 100%;
            background: linear-gradient(90deg, var(--dourado), var(--destaque));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Controles */
        .controls-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 20px 24px;
            border-top: 1px solid var(--borda);
            background: var(--card);
            flex-wrap: wrap;
        }

        .btn-kindle {
            background: var(--card);
            border: 1px solid var(--borda);
            color: var(--texto);
            padding: 10px 20px;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .btn-kindle:hover {
            background: #f5f0e8;
            border-color: #c4b59a;
        }

        .btn-kindle:active {
            transform: scale(0.97);
        }

        .btn-kindle.primary {
            background: var(--texto);
            color: var(--card);
            border-color: var(--texto);
            font-weight: 600;
            padding: 12px 28px;
        }

        .btn-kindle.primary:hover {
            background: #4a3828;
        }

        .speed-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--texto-claro);
        }

        .speed-value {
            font-family: 'Libre Baskerville', serif;
            font-size: 1.5rem;
            color: var(--texto);
            font-weight: 700;
            min-width: 50px;
            text-align: center;
        }

        .speed-btn {
            background: none;
            border: 1px solid var(--borda);
            color: var(--texto);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .speed-btn:hover {
            background: var(--bg);
            border-color: #c4b59a;
        }

        /* Input de texto */
        .text-input-area {
            padding: 20px 24px;
            border-top: 1px solid var(--borda);
            background: #fdfbf6;
        }

        .text-input-area textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--borda);
            border-radius: 6px;
            font-family: 'Libre Baskerville', 'Georgia', serif;
            font-size: 0.95rem;
            color: var(--texto);
            background: var(--card);
            resize: vertical;
            min-height: 80px;
            transition: border-color 0.2s;
        }

        .text-input-area textarea:focus {
            outline: none;
            border-color: var(--dourado);
        }

        .text-input-area label {
            display: block;
            font-size: 0.75rem;
            color: var(--texto-claro);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        /* Responsivo */
        @media (max-width: 600px) {
            .kindle-container {
                border-radius: 0;
                box-shadow: var(--sombra);
            }
            .reader-area {
                padding: 32px 24px;
            }
            .current-word {
                font-size: 3rem;
            }
            .controls-area {
                gap: 10px;
            }
            .btn-kindle {
                padding: 8px 14px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="kindle-container">
        
        <!-- Cabeçalho Kindle -->
        <div class="kindle-header">
            <span class="kindle-title">📖 Speed Read</span>
            <div class="kindle-icons">
                <span class="kindle-icon" title="Ajustar fonte" onclick="changeFont()">𝐀</span>
                <span class="kindle-icon" title="Modo claro/escuro" onclick="toggleTheme()">☀️</span>
            </div>
        </div>

        <!-- Área de leitura -->
        <div class="reader-area" id="readerArea">
            <div class="word-display">
                <div class="current-word" id="currentWord">Speed</div>
                <div class="word-context" id="wordContext"></div>
            </div>

            <div class="position-indicator" id="positionIndicator">
                <span id="wordCount">0</span> palavras
            </div>
        </div>

        <!-- Barra de progresso -->
        <div class="kindle-progress">
            <div class="progress-bar-kindle">
                <div class="progress-fill-kindle" id="progressFill" style="width: 0%"></div>
            </div>
        </div>

        <!-- Controles -->
        <div class="controls-area">
            <button class="btn-kindle" onclick="prevWord()" title="Palavra anterior">◁</button>
            
            <button class="btn-kindle primary" id="playBtn" onclick="togglePlay()">
                ▶ Iniciar
            </button>
            
            <button class="btn-kindle" onclick="nextWord()" title="Próxima palavra">▷</button>
            
            <button class="btn-kindle" onclick="resetReader()" title="Reiniciar">↺</button>

            <div class="speed-selector">
                <button class="speed-btn" onclick="changeSpeed(-50)">−</button>
                <span class="speed-value" id="speedDisplay">300</span>
                <button class="speed-btn" onclick="changeSpeed(50)">+</button>
                <span style="font-size:0.7rem;">WPM</span>
            </div>
        </div>

        <!-- Entrada de texto -->
        <div class="text-input-area">
            <label>📝 Cole ou digite seu texto para leitura rápida:</label>
            <textarea id="textInput" placeholder="Digite ou cole seu texto aqui... O Speed Read exibirá uma palavra por vez para leitura rápida.">O Speed Read é uma técnica revolucionária de leitura dinâmica. Em vez de mover os olhos linha por linha, você recebe uma palavra de cada vez no centro da tela. Isso elimina o tempo perdido com movimentos oculares e aumenta drasticamente sua velocidade de leitura. Experimente ajustar a velocidade e descubra seu ritmo ideal. Com prática constante, você pode triplicar sua velocidade de leitura mantendo total compreensão do texto.</textarea>
        </div>

    </div>

    <script>
        // ============================================
        // SPEED READ - MODO KINDLE
        // ============================================

        var words = [];
        var currentIndex = 0;
        var isPlaying = false;
        var speed = 300; // Palavras por minuto
        var intervalId = null;
        var currentFontSize = 4.5;
        var isDarkMode = false;

        function loadText() {
            var text = document.getElementById('textInput').value.trim();
            if (!text) {
                words = ['Digite', 'ou', 'cole', 'seu', 'texto', 'acima', 'para', 'começar', 'a', 'leitura', 'rápida.'];
            } else {
                words = text.split(/\s+/).filter(function(w) { return w.length > 0; });
            }
            currentIndex = 0;
            updateDisplay();
            updateProgress();
            document.getElementById('wordCount').textContent = words.length;
        }

        function updateDisplay() {
            if (words.length === 0) {
                loadText();
                return;
            }
            
            if (currentIndex >= words.length) {
                document.getElementById('currentWord').textContent = 'Fim!';
                document.getElementById('wordContext').textContent = 'Texto concluído com sucesso';
                stopReading();
                return;
            }
            
            var word = words[currentIndex];
            document.getElementById('currentWord').textContent = word;
            
            // Contexto (palavra anterior e próxima)
            var prev = currentIndex > 0 ? words[currentIndex - 1] + ' ' : '';
            var next = currentIndex < words.length - 1 ? ' ' + words[currentIndex + 1] : '';
            document.getElementById('wordContext').textContent = prev + '...' + next;
            
            updateProgress();
        }

        function updateProgress() {
            if (words.length === 0) return;
            var progress = (currentIndex / words.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('wordCount').textContent = words.length;
        }

        function nextWord() {
            if (currentIndex < words.length - 1) {
                currentIndex++;
                updateDisplay();
            } else if (currentIndex >= words.length - 1) {
                stopReading();
            }
        }

        function prevWord() {
            if (currentIndex > 0) {
                currentIndex--;
                updateDisplay();
            }
        }

        function startReading() {
            if (words.length === 0) loadText();
            if (currentIndex >= words.length - 1) currentIndex = 0;
            
            isPlaying = true;
            document.getElementById('playBtn').textContent = '⏸ Pausar';
            document.getElementById('playBtn').style.background = '#8b6914';
            document.getElementById('playBtn').style.color = '#faf7f0';
            
            var interval = Math.round(60000 / speed);
            
            clearInterval(intervalId);
            intervalId = setInterval(function() {
                if (isPlaying) {
                    nextWord();
                }
            }, interval);
        }

        function stopReading() {
            isPlaying = false;
            clearInterval(intervalId);
            document.getElementById('playBtn').textContent = '▶ Iniciar';
            document.getElementById('playBtn').style.background = '#382d1f';
            document.getElementById('playBtn').style.color = '#faf7f0';
        }

        function togglePlay() {
            if (isPlaying) {
                stopReading();
            } else {
                if (currentIndex >= words.length - 1) currentIndex = 0;
                updateDisplay();
                startReading();
            }
        }

        function resetReader() {
            stopReading();
            currentIndex = 0;
            updateDisplay();
        }

        function changeSpeed(delta) {
            speed = Math.max(50, Math.min(1000, speed + delta));
            document.getElementById('speedDisplay').textContent = speed;
            
            if (isPlaying) {
                stopReading();
                startReading();
            }
        }

        function changeFont() {
            var wordEl = document.getElementById('currentWord');
            if (currentFontSize === 4.5) {
                currentFontSize = 6;
                wordEl.style.fontSize = '6rem';
            } else if (currentFontSize === 6) {
                currentFontSize = 3;
                wordEl.style.fontSize = '3rem';
            } else {
                currentFontSize = 4.5;
                wordEl.style.fontSize = '4.5rem';
            }
        }

        function toggleTheme() {
            var root = document.documentElement;
            var icon = document.querySelector('.kindle-icon:last-child');
            
            if (!isDarkMode) {
                root.style.setProperty('--bg', '#1a1a1a');
                root.style.setProperty('--card', '#2a2a2a');
                root.style.setProperty('--texto', '#d4c5b2');
                root.style.setProperty('--texto-claro', '#8b7355');
                root.style.setProperty('--borda', '#3a3a3a');
                root.style.setProperty('--dourado', '#b8956a');
                root.style.setProperty('--destaque', '#d4a84b');
                icon.textContent = '🌙';
                document.querySelector('.text-input-area').style.background = '#222';
                document.querySelector('textarea').style.background = '#2a2a2a';
                document.querySelector('textarea').style.color = '#d4c5b2';
            } else {
                root.style.setProperty('--bg', '#f5f0e8');
                root.style.setProperty('--card', '#faf7f0');
                root.style.setProperty('--texto', '#382d1f');
                root.style.setProperty('--texto-claro', '#8b7355');
                root.style.setProperty('--borda', '#d4c5b2');
                root.style.setProperty('--dourado', '#b8956a');
                root.style.setProperty('--destaque', '#8b6914');
                icon.textContent = '☀️';
                document.querySelector('.text-input-area').style.background = '#fdfbf6';
                document.querySelector('textarea').style.background = '#faf7f0';
                document.querySelector('textarea').style.color = '#382d1f';
            }
            isDarkMode = !isDarkMode;
        }

        // Atualiza ao digitar
        document.getElementById('textInput').addEventListener('input', function() {
            stopReading();
            loadText();
        });

        // Teclas de atalho
        document.addEventListener('keydown', function(e) {
            if (e.key === ' ') {
                e.preventDefault();
                togglePlay();
            } else if (e.key === 'ArrowRight') {
                nextWord();
            } else if (e.key === 'ArrowLeft') {
                prevWord();
            } else if (e.key === 'ArrowUp') {
                changeSpeed(50);
            } else if (e.key === 'ArrowDown') {
                changeSpeed(-50);
            } else if (e.key === 'r' || e.key === 'R') {
                resetReader();
            }
        });

        // Inicialização
        function init() {
            loadText();
            document.getElementById('speedDisplay').textContent = speed;
            document.getElementById('wordCount').textContent = words.length;
        }

        init();
    </script>
</body>
</html>
